server:
  port: 40001

spring:
  application:
    name: api1
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/actorgram?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true}
    username: ${DB_USER:actorgram}
    password: ${DB_PASSWORD:actorgram}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.actorgram.api1: DEBUG
