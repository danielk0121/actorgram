<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>actors</title>
  <script>
    // GitHub Pages SPA 라우팅 우회
    // 경로를 쿼리 파라미터로 변환하여 index.html로 리다이렉트
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 2).join('/') +
      '/?p=' + encodeURIComponent(l.pathname.slice(1) + l.search) +
      (l.hash || '')
    );
  </script>
</head>
<body></body>
</html>
