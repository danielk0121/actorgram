<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>actors</title>
    <meta name="description" content="배우와 영화를 탐색하고 검색하는 앱" />
    <!-- OG Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="actors" />
    <meta property="og:description" content="배우와 영화를 탐색하고 검색하는 앱" />
    <meta property="og:image" content="/favicon.svg" />
    <meta property="og:locale" content="ko_KR" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="actors" />
    <meta name="twitter:description" content="배우와 영화를 탐색하고 검색하는 앱" />
    <meta name="twitter:image" content="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <!-- GitHub Pages SPA 라우팅 복원 -->
    <script>
      (function() {
        var p = window.location.search.slice(1).split('&').find(function(s) { return s.startsWith('p=') });
        if (p) {
          var path = decodeURIComponent(p.slice(2));
          window.history.replaceState(null, null, '/' + path);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
